<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submarine Cable Map</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
    body {
      background:
        radial-gradient(circle at 18% 20%, rgba(42, 112, 147, 0.22), transparent 32%),
        linear-gradient(140deg, #06151d 0%, #0b1f27 48%, #071016 100%);
      color: #d8e6e7;
      font: 12px/1.45 "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    svg { display: block; width: 100vw; height: 100vh; }
    .sphere { fill: #071923; }
    .graticule { fill: none; stroke: rgba(150, 191, 194, 0.12); stroke-width: 0.6; }
    .country { fill: #112c32; stroke: rgba(194, 223, 218, 0.2); stroke-width: 0.45; }
    .cable {
      fill: none;
      stroke: var(--line-color, #48d3c5);
      stroke-width: 1.05;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-opacity: 0.44;
      vector-effect: non-scaling-stroke;
    }
    .cable.focused { stroke: #f0d25b; stroke-width: 2.6; stroke-opacity: 0.95; }
    .landing {
      fill: #f3eee2;
      stroke: #17343a;
      stroke-width: 0.8;
      opacity: 0.8;
      vector-effect: non-scaling-stroke;
    }
    .landing.hidden { display: none; }
    .panel {
      position: fixed;
      top: 18px;
      left: 18px;
      width: min(390px, calc(100vw - 36px));
      padding: 16px;
      background: rgba(5, 19, 25, 0.84);
      border: 1px solid rgba(176, 221, 216, 0.18);
      border-radius: 8px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(12px);
    }
    h1 {
      margin: 0 0 10px;
      font: 700 19px/1.1 "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
      letter-spacing: 0;
      color: #f4fbf7;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 12px 0;
    }
    .stat {
      padding: 8px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 6px;
    }
    .stat strong { display: block; font-size: 18px; line-height: 1; color: #ffffff; }
    .stat span { color: #91acac; font-size: 10px; text-transform: uppercase; }
    .controls { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .route-controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      margin-top: 8px;
    }
    input, button, select {
      height: 34px;
      border-radius: 6px;
      border: 1px solid rgba(187, 225, 220, 0.18);
      background: rgba(255, 255, 255, 0.07);
      color: #eef7f5;
      font: inherit;
    }
    input, select { min-width: 0; padding: 0 10px; }
    button { padding: 0 12px; cursor: pointer; }
    button:hover { background: rgba(255, 255, 255, 0.12); }
    .toggles {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      color: #a8c0bf;
    }
    .toggles label { display: inline-flex; align-items: center; gap: 6px; }
    .toggles input { width: 16px; height: 16px; accent-color: #48d3c5; }
    .status { margin-top: 10px; min-height: 18px; color: #9eb9b7; }
    .status.error { color: #ffb099; }
    .status.route { color: #f0d25b; }
    .legend {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(330px, calc(100vw - 36px));
      padding: 12px 14px;
      background: rgba(5, 19, 25, 0.76);
      border: 1px solid rgba(176, 221, 216, 0.16);
      border-radius: 8px;
      color: #a9bfbd;
      backdrop-filter: blur(10px);
    }
    .swatch {
      display: inline-block;
      width: 34px;
      height: 3px;
      margin-right: 8px;
      vertical-align: middle;
      background: linear-gradient(90deg, #48d3c5, #f0d25b);
    }
    .tooltip {
      position: fixed;
      pointer-events: none;
      transform: translate(12px, 12px);
      max-width: 260px;
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(1, 10, 14, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #edf7f4;
      opacity: 0;
      transition: opacity 120ms ease;
    }
    @media (max-width: 720px) {
      .panel { top: 10px; left: 10px; width: calc(100vw - 20px); padding: 12px; }
      .legend { display: none; }
      h1 { font-size: 16px; }
      .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .stat strong { font-size: 15px; }
      .route-controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <svg id="map" aria-label="世界の海底ケーブル地図"></svg>
  <section class="panel">
    <h1>Submarine Cable Map</h1>
    <div class="stats">
      <div class="stat"><strong id="cable-count">--</strong><span>cables</span></div>
      <div class="stat"><strong id="route-count">--</strong><span>routes</span></div>
      <div class="stat"><strong id="landing-count">--</strong><span>landings</span></div>
    </div>
    <div class="controls">
      <input id="search" type="search" autocomplete="off" placeholder="Search cable name">
      <button id="reset">Reset</button>
    </div>
    <div class="route-controls">
      <select id="from-country" aria-label="From country"></select>
      <select id="to-country" aria-label="To country"></select>
      <button id="route">Route</button>
    </div>
    <div class="toggles">
      <label><input id="landing-toggle" type="checkbox" checked> landing points</label>
      <label><input id="animate-toggle" type="checkbox"> flow</label>
    </div>
    <div id="status" class="status">Loading live submarinecablemap.com data...</div>
  </section>
  <aside class="legend">
    <span class="swatch"></span>Live GeoJSON routes from submarinecablemap.com. Drag to pan, scroll to zoom.
  </aside>
  <div id="tooltip" class="tooltip"></div>

	  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
	  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
	  <script src="../shared/telemetry-client.js"></script>
  <script type="module" src="/submarine_cables.js"></script>
</body>
</html>
