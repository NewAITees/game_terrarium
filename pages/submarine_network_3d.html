<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submarine Network 3D</title>
  <style>
    *, html, body { margin: 0; overflow: hidden; background: #061018; }
    canvas { display: block; }
    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      width: min(360px, calc(100vw - 32px));
      padding: 14px 16px;
      border: 1px solid rgba(174, 222, 216, 0.16);
      border-radius: 8px;
      background: rgba(4, 15, 22, 0.84);
      color: #a9c1bf;
      font: 12px/1.55 "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 10px;
      color: #f4fbf7;
      font: 700 18px/1.12 "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
      letter-spacing: 0;
    }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
    .stat {
      padding: 7px 8px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.045);
    }
    .stat strong { display: block; color: #fff; font-size: 17px; line-height: 1; }
    .stat span { color: #8ba3a1; font-size: 10px; text-transform: uppercase; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    input[type=range] { width: 100%; accent-color: #54d0c6; }
    .control-block { margin-top: 10px; }
    .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    button {
      height: 30px;
      border: 1px solid rgba(174, 222, 216, 0.18);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.07);
      color: #d9f4ef;
      font: inherit;
      cursor: pointer;
    }
    button:hover { background: rgba(255, 255, 255, 0.12); }
    #top-list { margin-top: 10px; color: #c9d8d4; }
    #top-list div { display: flex; justify-content: space-between; gap: 12px; border-top: 1px solid rgba(255,255,255,.06); padding: 4px 0; }
    #status { margin-top: 8px; min-height: 18px; color: #8fa9a6; }
    #tooltip {
      position: fixed;
      pointer-events: none;
      transform: translate(12px, 12px);
      max-width: 260px;
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(1, 10, 14, 0.9);
      border: 1px solid rgba(255,255,255,.12);
      color: #edf7f4;
      font: 12px/1.4 "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
      opacity: 0;
      transition: opacity 120ms ease;
    }
    #caption {
      position: fixed;
      right: 16px;
      bottom: 14px;
      color: rgba(205, 226, 222, 0.52);
      font: 11px/1.4 "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    #map-label {
      position: fixed;
      left: 16px;
      bottom: 14px;
      color: rgba(223, 240, 235, 0.62);
      font: 11px/1.4 "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <section id="ui">
    <h1>Submarine Network 3D</h1>
    <div class="stats">
      <div class="stat"><strong id="landing-count">--</strong><span>relays</span></div>
      <div class="stat"><strong id="country-count">--</strong><span>countries</span></div>
      <div class="stat"><strong id="edge-count">--</strong><span>links</span></div>
    </div>
    <label>
      <div class="row"><span>Visible relay nodes</span><strong id="limit-value">220</strong></div>
      <input id="limit" type="range" min="80" max="360" step="20" value="220">
    </label>
    <label class="control-block">
      <div class="row"><span>Node height scale</span><strong id="height-value">100%</strong></div>
      <input id="height-scale" type="range" min="0" max="100" step="5" value="100">
    </label>
    <label class="control-block">
      <div class="row"><span>Cable arc height</span><strong id="arc-value">100%</strong></div>
      <input id="arc-scale" type="range" min="20" max="140" step="5" value="100">
    </label>
    <div class="button-row">
      <button id="ground-nodes">Ground nodes</button>
      <button id="restore-height">Restore height</button>
    </div>
    <div id="top-list"></div>
    <div id="status">Loading cable topology...</div>
  </section>
  <div id="tooltip"></div>
  <div id="map-label">floor map: world coastline / country borders</div>
  <div id="caption">PageRank-like centrality: high relay nodes rise, country anchors sit below.</div>

	  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
	  <script src="../shared/telemetry-client.js"></script>
  <script type="module" src="/submarine_network_3d.js"></script>
</body>
</html>
