<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Network Alpha v2</title>
  <style>
    *, html, body { margin: 0; overflow: hidden; background: #080d18; }
    canvas { display: block; }

    #ui {
      position: fixed; top: 16px; right: 16px;
      background: rgba(6,12,24,0.88); border: 1px solid #1a3050;
      border-radius: 8px; padding: 14px 16px; width: 200px;
      color: #7a9ab0; font: 12px/1.6 "SF Mono", Menlo, monospace;
      backdrop-filter: blur(6px);
    }
    #ui h3 { color: #b8ccd8; font-size: 10px; letter-spacing: .12em;
             text-transform: uppercase; margin: 0 0 10px; }
    #ui label { display: block; margin-top: 8px; }
    .row { display: flex; justify-content: space-between; }
    .val { color: #c8d8e8; }
    #ui input[type=range] { width: 100%; margin-top: 3px; accent-color: #3B8BD4; }
    #ui select {
      width: 100%; margin-top: 3px; background: #0a1626;
      color: #c8d8e8; border: 1px solid #1a3050;
      padding: 4px; border-radius: 4px;
    }
    .btn {
      width: 100%; margin-top: 8px; padding: 6px;
      background: #0d2240; border: 1px solid #1a4060;
      color: #7ac4e0; border-radius: 4px; cursor: pointer;
      font: inherit; transition: background .15s;
    }
    .btn:hover { background: #183550; }
    #rewire-group { display: none; }

    #legend {
      position: fixed; bottom: 16px; left: 16px;
      background: rgba(6,12,24,0.82); border: 1px solid #1a3050;
      border-radius: 8px; padding: 10px 14px;
      color: #7a9ab0; font: 11px/1.9 "SF Mono", Menlo, monospace;
    }
    .dot { display: inline-block; width: 9px; height: 9px;
           border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .dash { display: inline-block; width: 18px; height: 2px;
            border-top: 2px dashed #D85A30; margin-right: 4px; vertical-align: middle; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<div id="ui">
  <h3>Network Topology</h3>
  <label>
    <div class="row"><span>Total nodes</span><span class="val" id="total-val">30</span></div>
    <input type="range" id="total" min="12" max="60" value="30">
  </label>
  <label>
    <div class="row"><span>Mode</span></div>
    <select id="mode">
      <option value="tree">Tree 純粋な木</option>
      <option value="smallworld">Small World</option>
    </select>
  </label>
  <div id="rewire-group">
    <label>
      <div class="row"><span>Rewire %</span><span class="val" id="rewire-val">8</span></div>
      <input type="range" id="rewire" min="3" max="25" value="8">
    </label>
  </div>
  <button class="btn" id="regen">Regenerate</button>
  <button class="btn" id="reseed">New Seed</button>
</div>

<div id="legend">
  <div><span class="dot" style="background:#3B8BD4"></span>Core Router</div>
  <div><span class="dot" style="background:#1D9E75"></span>Dist Router</div>
  <div><span class="dot" style="background:#BA7517"></span>Access Switch</div>
  <div><span class="dot" style="background:#888780"></span>Terminal</div>
  <div><span class="dot" style="background:#FFD060"></span>Server</div>
  <div id="sw-legend" style="display:none">
    <span class="dash"></span>Shortcut
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ── Renderer / Scene ─────────────────────────────────────────────
const BG = 0x080d18;
const scene = new THREE.Scene();
scene.background = new THREE.Color(BG);
scene.fog = new THREE.FogExp2(BG, 0.004);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.5, 700);
camera.position.set(0, 75, 135);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.04;
controls.autoRotate = true; controls.autoRotateSpeed = 0.25;
controls.minDistance = 30; controls.maxDistance = 320;
controls.target.set(0, 8, 0);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.5, 0.07));

// Lighting
scene.add(new THREE.AmbientLight(0x112233, 3));
const keyLight = new THREE.DirectionalLight(0xfff0cc, 1.6);
keyLight.position.set(20, 60, 30); scene.add(keyLight);
scene.add(Object.assign(new THREE.DirectionalLight(0x2244aa, 0.8), {
  position: new THREE.Vector3(-30, 20, -40)
}));

// ── Seeded RNG (xorshift32) ──────────────────────────────────────
class RNG {
  constructor(seed) { this.s = ((seed || Math.random() * 2 ** 32) ^ 0xDEADBEEF) >>> 0; }
  next() {
    let x = this.s; x ^= x << 13; x ^= x >> 17; x ^= x << 5;
    return (this.s = x >>> 0) / 0x100000000;
  }
  range(lo, hi) { return lo + this.next() * (hi - lo); }
  int(lo, hi)   { return lo + (this.next() * (hi - lo + 1) | 0); }
  pick(arr)     { return arr[this.next() * arr.length | 0]; }
}

// ── Topology (Python logic ported) ───────────────────────────────
const LAYERS = ['core', 'dist', 'acc', 'term'];
const Y_LEVEL = { core: 36, dist: 20, acc: 4, term: -16 };

function layerCounts(total) {
  const core = 1;
  const dist = Math.max(2, Math.min(4, Math.floor(total * 0.10)));
  const acc  = Math.max(3, Math.min(10, Math.floor(total * 0.25)));
  return { core, dist, acc, term: Math.max(1, total - core - dist - acc) };
}

function edgeKey(a, b) { return `${Math.min(a,b)}-${Math.max(a,b)}`; }

function buildTopology(total, seed, mode, rewirePct) {
  const rng = new RNG(seed);
  const counts = layerCounts(total);
  const SPREAD = Math.max(110, counts.term * 14);

  const nodes = [], layerNodes = {};

  for (const layer of LAYERS) {
    const n = counts[layer];
    layerNodes[layer] = [];
    for (let i = 0; i < n; i++) {
      const x = ((i + 1) / (n + 1) - 0.5) * SPREAD + rng.range(-4, 4);
      const z = rng.range(-12, 12);
      const node = { id: nodes.length, layer, x, z, y: Y_LEVEL[layer],
                     parent: null, children: [], isServer: false };
      nodes.push(node);
      layerNodes[layer].push(node);
    }
  }

  // Each child → nearest-X parent (Python: build_tree logic)
  const treeEdges = [];
  for (let li = 1; li < LAYERS.length; li++) {
    const parents  = layerNodes[LAYERS[li - 1]];
    const children = layerNodes[LAYERS[li]];
    for (const child of children) {
      const parent = parents.reduce((b, p) =>
        Math.abs(p.x - child.x) < Math.abs(b.x - child.x) ? p : b);
      child.parent = parent;
      parent.children.push(child);
      treeEdges.push({ a: parent, b: child, kind: 'tree' });
    }
    // Orphan check: parent with no children → link to random child
    for (const parent of parents) {
      if (parent.children.length === 0) {
        const child = rng.pick(children);
        parent.children.push(child);
        treeEdges.push({ a: parent, b: child, kind: 'tree' });
      }
    }
  }

  // Small world: non-adjacent layer shortcuts (Python: add_small_world)
  const shortcutEdges = [];
  if (mode === 'smallworld') {
    const existing = new Set(treeEdges.map(e => edgeKey(e.a.id, e.b.id)));
    const k = Math.max(1, Math.round(nodes.length * rewirePct / 100));
    let added = 0, attempts = 0;
    while (added < k && attempts < k * 30) {
      attempts++;
      const u = rng.pick(nodes), v = rng.pick(nodes);
      if (u === v) continue;
      const ek = edgeKey(u.id, v.id);
      if (existing.has(ek)) continue;
      if (Math.abs(LAYERS.indexOf(u.layer) - LAYERS.indexOf(v.layer)) < 2) continue;
      existing.add(ek);
      shortcutEdges.push({ a: u, b: v, kind: 'shortcut' });
      added++;
    }
  }

  // Server = terminal closest to x=0
  const terms = layerNodes['term'];
  const server = terms.reduce((b, t) => Math.abs(t.x) < Math.abs(b.x) ? t : b);
  server.isServer = true;

  return { nodes, treeEdges, shortcutEdges, layerNodes, server };
}

// LCA path finding
function findPath(from, to) {
  const pathA = [];
  let n = from;
  while (n) { pathA.push(n); n = n.parent; }

  const pathB = [];
  n = to;
  while (n) { pathB.push(n); n = n.parent; }

  const setA = new Set(pathA);
  let ia = pathA.length - 1, ib = 0;
  for (let i = 0; i < pathB.length; i++) {
    if (setA.has(pathB[i])) { ia = pathA.indexOf(pathB[i]); ib = i; break; }
  }
  return [...pathA.slice(0, ia + 1), ...pathB.slice(0, ib).reverse()];
}

// ── Node visual styles ───────────────────────────────────────────
const LAYER_STYLE = {
  core:   { color: 0x3B8BD4, emissive: 0x0d2d55, emissiveInt: 1.4,
            geo: () => new THREE.TorusGeometry(4, 1.1, 12, 26),
            halo: 10, haloOp: 0.06, spinX: 0.18, spinZ: 0.10 },
  dist:   { color: 0x1D9E75, emissive: 0x073d2c, emissiveInt: 1.3,
            geo: () => new THREE.TorusGeometry(2.6, 0.72, 10, 20),
            halo: 6.5, haloOp: 0.05, spinX: 0.22, spinZ: 0.14 },
  acc:    { color: 0xBA7517, emissive: 0x4a2c06, emissiveInt: 1.1,
            geo: () => new THREE.BoxGeometry(4.8, 0.85, 2.6),
            halo: 5, haloOp: 0.04, spinY: 0 },
  term:   { color: 0x888780, emissive: 0x222220, emissiveInt: 0.9,
            geo: () => new THREE.ConeGeometry(1.0, 2.5, 6),
            halo: 2.8, haloOp: 0.025, spinY: 0.28 },
  server: { color: 0xFFD060, emissive: 0x7a4a00, emissiveInt: 1.8,
            geo: () => new THREE.CylinderGeometry(1.9, 2.3, 5.5, 10),
            halo: 9, haloOp: 0.07, spinY: 0.12 },
};

// ── Scene objects (rebuilt on regen) ────────────────────────────
let topoObjects = [];  // { obj, geo, mat } for disposal
let edgeMap = new Map();
let serverNode = null;
let terminalNodes = [];
let packets = [];
let spinData = [];
let serverGlow = null;

function disposeObj({ obj, geo, mat }) {
  scene.remove(obj);
  geo?.dispose();
  (Array.isArray(mat) ? mat : [mat]).forEach(m => m?.dispose());
}

function clearTopo() {
  topoObjects.forEach(disposeObj);
  topoObjects = [];
  edgeMap.clear();
  packets.forEach(p => { scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); });
  packets = [];
  spinData = [];
  if (serverGlow) { scene.remove(serverGlow); serverGlow = null; }
}

function makeNodeMesh(node) {
  const sk = node.isServer ? 'server' : node.layer;
  const s = LAYER_STYLE[sk];
  const geo = s.geo();
  const mat = new THREE.MeshStandardMaterial({
    color: s.color, emissive: s.emissive, emissiveIntensity: s.emissiveInt,
    metalness: 0.45, roughness: 0.25,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(node.x, node.y, node.z);

  const haloGeo = new THREE.SphereGeometry(s.halo, 12, 12);
  const haloMat = new THREE.MeshBasicMaterial({
    color: s.color, transparent: true, opacity: s.haloOp, side: THREE.BackSide,
  });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  mesh.add(halo);
  scene.add(mesh);

  topoObjects.push({ obj: mesh, geo, mat });
  topoObjects.push({ obj: halo, geo: haloGeo, mat: haloMat }); // halo tracked but inside mesh

  spinData.push({ mesh, style: s });
  return mesh;
}

function makeEdgeLine(a, b, shortcut) {
  const p0 = new THREE.Vector3(a.x, a.y, a.z);
  const p2 = new THREE.Vector3(b.x, b.y, b.z);
  const mid = p0.clone().lerp(p2, 0.5);
  mid.y += shortcut ? 12 : 6;

  const curve = new THREE.QuadraticBezierCurve3(p0, mid, p2);
  const pts = curve.getPoints(70);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);

  let mat;
  if (shortcut) {
    mat = new THREE.LineDashedMaterial({ color: 0xD85A30, dashSize: 2.5, gapSize: 1.2,
                                         transparent: true, opacity: 0.6 });
  } else {
    mat = new THREE.LineBasicMaterial({ color: 0x1a3a5c, transparent: true, opacity: 0.5 });
  }
  const line = new THREE.Line(geo, mat);
  if (shortcut) line.computeLineDistances();
  scene.add(line);

  const edge = { line, curve, a_node: a, b_node: b, activeUntil: 0, shortcut };
  topoObjects.push({ obj: line, geo, mat });
  return edge;
}

// Active edge materials (shared, not disposed)
const matActive = new THREE.LineBasicMaterial({ color: 0xaaddff, transparent: true, opacity: 0.95 });
const matIdle   = new THREE.LineBasicMaterial({ color: 0x1a3a5c, transparent: true, opacity: 0.48 });
const matSCActive = new THREE.LineDashedMaterial({ color: 0xff8855, dashSize: 2.5, gapSize: 1.2,
                                                    transparent: true, opacity: 0.9 });
const matSCIdle   = new THREE.LineDashedMaterial({ color: 0x6a2010, dashSize: 2.5, gapSize: 1.2,
                                                    transparent: true, opacity: 0.55 });

// ── Build scene from topology ─────────────────────────────────────
function buildScene(total, seed, mode, rewirePct) {
  clearTopo();

  const topo = buildTopology(total, seed, mode, rewirePct);
  serverNode   = topo.server;
  terminalNodes = topo.layerNodes['term'];

  // Meshes
  topo.nodes.forEach(n => { n.mesh = makeNodeMesh(n); });

  // Server accent rings
  if (serverNode) {
    for (let i = 0; i < 3; i++) {
      const rGeo = new THREE.TorusGeometry(2.6, 0.07, 6, 22);
      const rMat = new THREE.MeshBasicMaterial({ color: 0xFFD060, transparent: true, opacity: 0.3 });
      const ring = new THREE.Mesh(rGeo, rMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.set(serverNode.x, serverNode.y - 1.5 + i * 1.5, serverNode.z);
      scene.add(ring);
      topoObjects.push({ obj: ring, geo: rGeo, mat: rMat });
    }
    serverGlow = new THREE.PointLight(0xFFD060, 3.5, 80);
    serverGlow.position.set(serverNode.x, serverNode.y + 5, serverNode.z);
    scene.add(serverGlow);
  }

  // Edges
  const allEdges = [];
  topo.treeEdges.forEach(e => {
    const edge = makeEdgeLine(e.a, e.b, false);
    allEdges.push(edge);
    edgeMap.set(edgeKey(e.a.id, e.b.id), edge);
  });
  topo.shortcutEdges.forEach(e => {
    const edge = makeEdgeLine(e.a, e.b, true);
    allEdges.push(edge);
    edgeMap.set(edgeKey(e.a.id, e.b.id), edge);
  });

  // Packets
  const rng2 = new RNG(seed + 1);
  const PKT_COLORS = [0xFFD060, 0x38aaff, 0xffffff, 0x44ffaa];
  for (let i = 0; i < 55; i++) {
    const c = PKT_COLORS[rng2.int(0, PKT_COLORS.length - 1)];
    const pGeo = new THREE.SphereGeometry(0.37, 7, 7);
    const pMat = new THREE.MeshBasicMaterial({ color: c });
    const mesh = new THREE.Mesh(pGeo, pMat);
    scene.add(mesh);
    const p = { mesh, path: [], seg: 0, t: rng2.next(), speed: 0.3 + rng2.next() * 0.35 };
    spawnPacket(p, rng2);
    packets.push(p);
  }

  return allEdges;
}

function spawnPacket(p, rng) {
  const terms = terminalNodes;
  if (!terms || terms.length < 2) return;

  const src = rng ? rng.pick(terms) : terms[Math.random() * terms.length | 0];
  let dst;
  if ((rng ? rng.next() : Math.random()) < 0.8) {
    dst = serverNode || terms[0];
  } else {
    do { dst = terms[Math.random() * terms.length | 0]; } while (dst === src);
  }
  const path = findPath(src, dst);
  p.path = (rng ? rng.next() : Math.random()) < 0.5 ? path : [...path].reverse();
  p.seg = 0;
  p.t = Math.random();
  p.speed = 0.3 + Math.random() * 0.35;
}

function getPacketEdge(p) {
  const a = p.path[p.seg], b = p.path[p.seg + 1];
  if (!a || !b) return null;
  return edgeMap.get(edgeKey(a.id, b.id)) || null;
}

// ── Grid ────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(200, 40, 0x0f2030, 0x0a1820);
grid.position.y = -26;
scene.add(grid);

// ── State ────────────────────────────────────────────────────────
let currentSeed = 42;
let allEdgesRef = [];

allEdgesRef = buildScene(30, currentSeed, 'tree', 8);

// ── Animation ────────────────────────────────────────────────────
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);
  const now = performance.now() / 1000;
  elapsed += delta;

  // Node rotations
  for (const { mesh, style: s } of spinData) {
    if (s.spinX) mesh.rotation.x += delta * s.spinX;
    if (s.spinZ) mesh.rotation.z += delta * s.spinZ;
    if (s.spinY) mesh.rotation.y += delta * s.spinY;
  }

  // Server glow pulse
  if (serverGlow) serverGlow.intensity = 3 + Math.sin(elapsed * 1.3) * 0.8;

  // Packet movement
  for (const p of packets) {
    p.t += delta * p.speed;
    if (p.t >= 1) {
      p.t = 0; p.seg++;
      if (p.seg >= p.path.length - 1) { spawnPacket(p, null); continue; }
    }
    const e = getPacketEdge(p);
    if (!e) { spawnPacket(p, null); continue; }
    const fwd = e.a_node === p.path[p.seg];
    p.mesh.position.copy(e.curve.getPoint(fwd ? p.t : 1 - p.t));
    e.activeUntil = Math.max(e.activeUntil, now + 0.14);
  }

  // Edge active state
  for (const e of allEdgesRef) {
    if (e.shortcut) {
      e.line.material = e.activeUntil > now ? matSCActive : matSCIdle;
    } else {
      e.line.material = e.activeUntil > now ? matActive : matIdle;
    }
  }

  controls.update();
  composer.render();
}

animate();

// ── UI ────────────────────────────────────────────────────────────
const totalSlider  = document.getElementById('total');
const totalVal     = document.getElementById('total-val');
const modeSelect   = document.getElementById('mode');
const rewireGroup  = document.getElementById('rewire-group');
const rewireSlider = document.getElementById('rewire');
const rewireVal    = document.getElementById('rewire-val');
const swLegend     = document.getElementById('sw-legend');

totalSlider.addEventListener('input', () => { totalVal.textContent = totalSlider.value; });
rewireSlider.addEventListener('input', () => { rewireVal.textContent = rewireSlider.value; });
modeSelect.addEventListener('change', () => {
  const sw = modeSelect.value === 'smallworld';
  rewireGroup.style.display = sw ? 'block' : 'none';
  swLegend.style.display = sw ? 'block' : 'none';
});

document.getElementById('regen').addEventListener('click', () => {
  const total   = parseInt(totalSlider.value);
  const mode    = modeSelect.value;
  const rewire  = parseInt(rewireSlider.value);
  allEdgesRef = buildScene(total, currentSeed, mode, rewire);
});

document.getElementById('reseed').addEventListener('click', () => {
  currentSeed = Math.random() * 1e9 | 0;
  const total  = parseInt(totalSlider.value);
  const mode   = modeSelect.value;
  const rewire = parseInt(rewireSlider.value);
  allEdgesRef = buildScene(total, currentSeed, mode, rewire);
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
