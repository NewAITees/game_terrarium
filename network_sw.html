<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Network — Small World</title>
  <style>
    *,html,body{margin:0;overflow:hidden;background:#0d2040;}
    canvas{display:block;}
    #label{position:fixed;bottom:14px;right:46px;font:11px/1 "SF Mono",Menlo,monospace;color:#2a4a60;letter-spacing:.1em;}
    #bg{position:fixed;bottom:12px;right:16px;width:22px;height:22px;border:none;padding:0;cursor:pointer;border-radius:4px;opacity:.5;}
  </style>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162/examples/jsm/"}}</script>
</head>
<body>
<div id="label">SMALL WORLD TOPOLOGY</div>
<input type="color" id="bg" value="#0d2040" title="Background">
<script src="./telemetry-client.js"></script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { buildTopology, buildScene, buildEdges, buildPackets,
         makeMats, tickEdges, tickPackets, initFlash, tickFlash,
         buildAdj, findShortestPath } from './network-core.js';

const TOTAL      = 24+(Math.random()*16|0);
const SEED       = Math.random()*1e9|0;
const REWIRE_PCT = 28;
const BG         = 0x0d2040;

// ── Scene ────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(BG);
scene.fog = new THREE.FogExp2(BG, 0.0042);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.5, 700);
camera.position.set(0,72,130);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=.04;
controls.autoRotate=true; controls.autoRotateSpeed=.28;
controls.minDistance=35; controls.maxDistance=300;
controls.target.set(0,8,0);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),1.5,.5,.07));

scene.add(new THREE.AmbientLight(0x112233,3));
const kl=new THREE.DirectionalLight(0xfff0cc,1.6); kl.position.set(20,60,30); scene.add(kl);
const fl=new THREE.DirectionalLight(0x2244aa,.8); fl.position.set(-30,20,-40); scene.add(fl);

// ── Build topology & scene ────────────────────────────────────────
const topo     = buildTopology(TOTAL, SEED, 'smallworld', REWIRE_PCT);
const spinData = [], edgeMap = new Map(), allEdges = [];
const mats     = makeMats();
const srvGlow  = buildScene(topo, scene, spinData);
buildEdges(topo, scene, edgeMap, allEdges, mats);

// BFS adjacency (uses tree + shortcut edges)
const adj = buildAdj(topo.nodes, edgeMap);
const route = (s,d) => findShortestPath(s,d,adj);

const glowMap  = initFlash(topo.nodes);
const {packets,respawn} = buildPackets(55, scene, topo, SEED+1, route);

const grid=new THREE.GridHelper(200,40,0x0f2030,0x0a1820); grid.position.y=-26; scene.add(grid);

function reportTelemetry(now){
  window.Telemetry?.report('network_smallworld', {
    mode: 'smallworld',
    seed: SEED,
    rewirePct: REWIRE_PCT,
    elapsed: Math.round(elapsed),
    nodes: topo.nodes.length,
    treeEdges: topo.treeEdges.length,
    shortcutEdges: topo.shortcutEdges.length,
    packets: packets.length,
    activeEdges: allEdges.filter(edge => edge.activeUntil > now).length,
    glowingNodes: [...glowMap.values()].filter(value => value > 0.05).length,
    serverNode: topo.server.id,
  });
}

// ── Animate ───────────────────────────────────────────────────────
const clock=new THREE.Clock(); let elapsed=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05), now=performance.now()/1000;
  elapsed+=dt;
  for(const {mesh,s} of spinData){
    if(s.rx) mesh.rotation.x+=dt*s.rx;
    if(s.rz) mesh.rotation.z+=dt*s.rz;
    if(s.ry) mesh.rotation.y+=dt*s.ry;
  }
  srvGlow.intensity=3+Math.sin(elapsed*1.3)*.8;
  tickPackets(packets,respawn,edgeMap,glowMap,dt,now);
  tickEdges(allEdges,mats,now);
  tickFlash(topo.nodes,glowMap,dt);
  reportTelemetry(now);
  controls.update(); composer.render();
}
animate();

document.getElementById('bg').addEventListener('input',e=>{
  const c=new THREE.Color(e.target.value);
  scene.background.set(c); scene.fog.color.set(c);
});
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
