<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Escort TD</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'SF Mono', Menlo, monospace; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 20px; display: flex; align-items: center; gap: 20px;
      pointer-events: none; color: #aaa; font-size: 12px; letter-spacing: .06em;
    }
    #hp-bar { width: 160px; height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
    #hp-fill { height: 100%; width: 100%; background: #4f4; transition: background .3s; }
    #roster {
      position: fixed; top: 44px; left: 20px;
      display: grid; grid-template-columns: repeat(2, max-content); gap: 6px 14px;
      padding: 10px 12px; border: 1px solid #243043; border-radius: 8px;
      background: rgba(5, 8, 14, .72); color: #8ea3ba; font-size: 11px; letter-spacing: .06em;
      min-width: 220px; pointer-events: none;
    }
    #roster .label { color: #5f728a; }
    #roster .value { color: #fff; text-align: right; }
    #legend {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
      padding: 8px 14px; border: 1px solid #2a3244; border-radius: 999px;
      background: rgba(7, 10, 18, .78); color: #8ea3ba; font-size: 11px; letter-spacing: .08em;
      box-shadow: 0 0 24px rgba(0,0,0,.35);
    }
    #command-panel {
      position: fixed; top: 12px; right: 16px;
      display: grid; gap: 8px;
      padding: 12px; border: 1px solid #273248; border-radius: 12px;
      background: rgba(6, 9, 16, .82); color: #9fb4ca;
      min-width: 204px; pointer-events: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    #command-panel .title {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 11px; letter-spacing: .12em; color: #67819c;
    }
    #command-panel .mode {
      color: #fff; font-weight: 700;
    }
    #command-buttons {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px;
    }
    #command-buttons button {
      appearance: none; border: 1px solid #30415a; border-radius: 8px;
      background: rgba(255,255,255,.03); color: #cfe2f6;
      padding: 7px 8px; font: inherit; font-size: 11px; letter-spacing: .08em;
      cursor: pointer;
    }
    #command-buttons button[data-active="true"] {
      border-color: #7cf7ff;
      background: rgba(124, 247, 255, .12);
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(124, 247, 255, .25);
    }
    #command-help {
      font-size: 10px; line-height: 1.4; color: #7e93ab;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,.05);
    }
    .chip b { color: #fff; }
    #msg {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 26px; font-weight: bold; letter-spacing: .12em;
      text-shadow: 0 0 24px currentColor; display: none;
    }
  </style>
</head>
<body>
<div id="hud">
  <span>♔ KING</span>
  <div id="hp-bar"><div id="hp-fill"></div></div>
  <span id="hp-val">400</span>
  <span style="color:#444">│</span>
  <span>GOLD <b id="gold" style="color:#fd0">100</b></span>
  <span style="color:#444">│</span>
  <span>WAVE <b id="wave" style="color:#f84">0</b></span>
</div>
<div id="roster">
  <div class="label">ALLY pawn</div><div class="value" id="ally-pawn">0</div>
  <div class="label">ALLY rook</div><div class="value" id="ally-rook">0</div>
  <div class="label">ALLY bishop</div><div class="value" id="ally-bishop">0</div>
  <div class="label">ALLY knight</div><div class="value" id="ally-knight">0</div>
  <div class="label">ALLY queen</div><div class="value" id="ally-queen">0</div>
  <div class="label">ENEMY ground</div><div class="value" id="enemy-ground">0</div>
  <div class="label">ENEMY siege</div><div class="value" id="enemy-siege">0</div>
  <div class="label">ENEMY air</div><div class="value" id="enemy-air">0</div>
</div>
<div id="command-panel">
  <div class="title">COMMAND <span class="mode" id="command-mode">BALANCED</span></div>
  <div class="title">KING <span class="mode" id="king-state">ADVANCE</span></div>
  <div id="command-buttons">
    <button type="button" id="cmd-deploy">D DEPLOY</button>
    <button type="button" id="cmd-stop">SPACE HOLD</button>
    <button type="button" id="cmd-balanced" data-mode="balanced" data-active="true">1 BALANCED</button>
    <button type="button" id="cmd-ground" data-mode="ground">2 GROUND</button>
    <button type="button" id="cmd-air" data-mode="air">3 AIR</button>
    <button type="button" id="cmd-siege" data-mode="siege">4 SIEGE</button>
  </div>
  <div id="command-help">KING は停止/前進のみ操作。機兵は自動警護し、DEPLOY で KING から増援が出ます。</div>
</div>
<div id="legend">
  <span class="chip"><b>AUTO</b> DEPLOY</span>
  <span class="chip"><b>D</b> DEPLOY</span>
  <span class="chip"><b>SPACE</b> HOLD</span>
  <span class="chip"><b>1-4</b> MODE</span>
  <span class="chip">♙ pawn</span>
  <span class="chip">♖ rook</span>
  <span class="chip">♗ bishop</span>
  <span class="chip">♘ knight</span>
  <span class="chip">♕ queen</span>
</div>
<div id="msg"></div>
<script type="module" src="/escort_td.js"></script>
</body>
</html>
