<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Escort TD</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'SF Mono', Menlo, monospace; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 20px; display: flex; align-items: center; gap: 20px;
      pointer-events: none; color: #aaa; font-size: 12px; letter-spacing: .06em;
    }
    #hp-bar { width: 160px; height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
    #hp-fill { height: 100%; width: 100%; background: #4f4; transition: background .3s; }
    #piece-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px;
    }
    .piece-btn {
      background: #111; border: 1px solid #333; color: #888;
      font-family: inherit; font-size: 11px; letter-spacing: .05em;
      padding: 8px 14px; border-radius: 4px; cursor: pointer;
      text-align: center; line-height: 1.5; transition: all .15s;
    }
    .piece-btn:hover { border-color: #666; color: #ccc; }
    .piece-btn.sel  { border-color: currentColor; color: #fff; background: #1a1a1a; }
    .piece-btn.sel[data-piece="pawn"]   { color: #40e0d0; }
    .piece-btn.sel[data-piece="rook"]   { color: #8899cc; }
    .piece-btn.sel[data-piece="bishop"] { color: #cc77ee; }
    .piece-btn.sel[data-piece="knight"] { color: #dd9944; }
    .piece-btn.sel[data-piece="queen"]  { color: #ffe066; }
    #msg {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 26px; font-weight: bold; letter-spacing: .12em;
      text-shadow: 0 0 24px currentColor; display: none;
    }
  </style>
</head>
<body>
<div id="hud">
  <span>♔ KING</span>
  <div id="hp-bar"><div id="hp-fill"></div></div>
  <span id="hp-val">400</span>
  <span style="color:#444">│</span>
  <span>GOLD <b id="gold" style="color:#fd0">100</b></span>
  <span style="color:#444">│</span>
  <span>WAVE <b id="wave" style="color:#f84">0</b></span>
</div>
<div id="piece-bar">
  <button class="piece-btn sel" data-piece="pawn">  ♙ PAWN<br> <small>40g · scout</small></button>
  <button class="piece-btn"     data-piece="rook">  ♖ ROOK<br> <small>80g · mortar</small></button>
  <button class="piece-btn"     data-piece="bishop">♗ BISHOP<br><small>70g · missile</small></button>
  <button class="piece-btn"     data-piece="knight">♘ KNIGHT<br><small>90g · gatling</small></button>
  <button class="piece-btn"     data-piece="queen"> ♕ QUEEN<br> <small>150g · map</small></button>
</div>
<div id="msg"></div>
<script type="module" src="/escort_td.js"></script>
</body>
</html>
