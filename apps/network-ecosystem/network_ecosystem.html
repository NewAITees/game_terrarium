<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Network — Ecosystem Balance</title>
  <style>
    *, html, body { margin: 0; overflow: hidden; background: #08140f; }
    canvas { display: block; }
    #label {
      position: fixed; bottom: 14px; right: 16px;
      font: 11px/1 "SF Mono", Menlo, monospace; color: #426855;
      letter-spacing: .1em;
    }
    #hud {
      position: fixed; top: 16px; left: 16px; width: 380px;
      padding: 14px 16px; border: 1px solid #244632; border-radius: 8px;
      background: rgba(4, 16, 10, 0.86); color: #a9c7b3;
      font: 12px/1.55 "SF Mono", Menlo, monospace; backdrop-filter: blur(8px);
    }
    #hud h1 { margin: 0 0 10px; color: #d8f2df; font-size: 13px; letter-spacing: .08em; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
    .stat { padding: 8px; background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.07); border-radius: 6px; }
    .stat strong { display: block; color: #eafad9; font-size: 18px; line-height: 1; }
    .stat span { font-size: 10px; color: #77977f; text-transform: uppercase; }
    .mode { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
    button {
      height: 32px; border-radius: 6px; border: 1px solid #335e45;
      background: #10291a; color: #b7dfc1; cursor: pointer; font: inherit;
    }
    button.active { color: #06110b; background: #91e6a5; border-color: #91e6a5; }
    #message { min-height: 34px; color: #91ab98; }
    #message.alert { color: #ffd080; }
    #hint { color: #6a8570; font-size: 11px; }
  </style>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162/examples/jsm/"}}</script>
</head>
<body>
<div id="hud">
  <h1>ECOSYSTEM BALANCE</h1>
  <div class="stats">
    <div class="stat"><strong id="balance">100</strong><span>balance</span></div>
    <div class="stat"><strong id="immune">0</strong><span>immune</span></div>
    <div class="stat"><strong id="stress">0</strong><span>stress</span></div>
    <div class="stat"><strong id="carnivore">0</strong><span>carnivore</span></div>
  </div>
  <div class="mode">
    <button id="seed-immune" class="active">Seed Immune</button>
    <button id="seed-threat">Seed Threat</button>
  </div>
  <div id="message">Carnivores emerge automatically where stress and resources concentrate.</div>
  <div id="hint">Click a node to introduce immune pressure or threat pressure.</div>
</div>
<div id="label">LIFE-LIKE EQUILIBRIUM MODEL</div>
<script src="./telemetry-client.js"></script>
<script type="module" src="./network_ecosystem.js"></script>
</body>
</html>
