<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Network — Tower Defense</title>
  <style>*, html, body { margin: 0; overflow: hidden; background: #070c18; }
  canvas { display: block; }
  #label { position: fixed; bottom: 14px; right: 16px;
    font: 11px/1 "SF Mono", Menlo, monospace; color: #385c72;
    letter-spacing: .1em; }
  #hud {
    position: fixed; top: 16px; left: 16px; width: 290px;
    padding: 14px 16px; border: 1px solid #1a3050; border-radius: 8px;
    background: rgba(5, 11, 22, 0.84); color: #9bb4c2;
    font: 12px/1.55 "SF Mono", Menlo, monospace; backdrop-filter: blur(8px);
  }
  #hud h1 { margin: 0 0 10px; color: #cfe8f4; font-size: 13px; letter-spacing: .08em; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .stat { padding: 8px; background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.07); border-radius: 6px; }
  .stat strong { display: block; color: #fff3c6; font-size: 18px; line-height: 1; }
  .stat span { font-size: 10px; color: #6f8da0; text-transform: uppercase; }
  .mode { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
  .agents { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 8px 0; }
  button {
    height: 32px; border-radius: 6px; border: 1px solid #24415f;
    background: #0d2038; color: #9cc9df; cursor: pointer; font: inherit;
  }
  button.active { color: #081018; background: #77d4e8; border-color: #77d4e8; }
  #message { min-height: 34px; color: #86a4b4; }
  #message.alert { color: #ff9f86; }
  #hint { color: #587589; font-size: 11px; }

  /* ── Log panel ─────────────────────────────────────── */
  #log-panel {
    position: fixed; top: 16px; right: 16px; width: 300px;
    height: calc(100vh - 32px);
    display: flex; flex-direction: column;
    padding: 12px; border: 1px solid #1a3050; border-radius: 8px;
    background: rgba(5,11,22,0.84); backdrop-filter: blur(8px);
    font: 11px/1.55 "SF Mono", Menlo, monospace;
  }
  #log-panel h2 {
    font-size: 10px; text-transform: uppercase; letter-spacing: .1em;
    color: #3a5a6a; margin: 0 0 8px; flex-shrink: 0;
  }
  #log-entries { flex: 1; overflow-y: auto; }
  .le { padding: 1px 0; word-break: break-all; }
  .le-wave    { color: #5ac8f0; font-weight: bold; margin-top: 6px; border-top: 1px solid #142030; padding-top: 4px; }
  .le-summary { color: #90b8c8; }
  .le-agent   { color: #5ddd8a; }
  .le-combat  { color: #e07858; }
  .le-ollama  { color: #c080f0; }
  .le-player  { color: #f0d060; }
  .le-info    { color: #3a5a6a; }

  /* ── End overlay ───────────────────────────────────── */
  #end-overlay {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(4,8,18,0.9); z-index: 200;
  }
  #end-overlay.show { display: flex; }
  #end-box {
    background: rgba(8,16,32,0.97); border: 1px solid #2a4a6a;
    border-radius: 12px; padding: 28px 36px; width: 400px;
    font: 12px/1.7 "SF Mono", Menlo, monospace; color: #9bb4c2;
  }
  #end-title {
    font-size: 20px; letter-spacing: .12em;
    margin: 0 0 16px; text-align: center;
  }
  #end-title.victory { color: #ffd060; }
  #end-title.defeat  { color: #e05c5c; }
  #end-stats { margin-bottom: 20px; }
  .end-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #0d1e2e; }
  .end-row .lbl { color: #4a6a7a; }
  .end-row .val { color: #c8d8e8; }
  #end-restart {
    width: 100%; padding: 10px; background: #0d2038;
    border: 1px solid #2a4a6a; color: #9cc9df;
    border-radius: 6px; cursor: pointer; font: inherit; font-size: 13px;
  }
  #end-restart:hover { background: #183550; }
  </style>
</head>
<body>
<div id="hud">
  <h1>TOWER DEFENSE MODEL</h1>
  <div class="stats">
    <div class="stat"><strong id="credits">50</strong><span>credits</span></div>
    <div class="stat"><strong id="score">0</strong><span>score</span></div>
    <div class="stat"><strong id="wave">1</strong><span>wave</span></div>
    <div class="stat"><strong id="time">0</strong><span>survive</span></div>
    <div class="stat"><strong id="kills">0</strong><span>blocked</span></div>
    <div class="stat"><strong id="health">100</strong><span>server</span></div>
  </div>
  <div class="mode">
    <button id="harden" class="active">Harden -20cr</button>
    <button id="reboot">Reboot -40cr</button>
  </div>
  <div class="agents">
    <button id="buy-junior">Junior -80cr</button>
    <button id="buy-mid">Mid -160cr</button>
    <button id="buy-senior">Senior -300cr</button>
  </div>
  <div id="message">Senior agent scans rules. Mid agents build firewalls. Juniors repair.</div>
  <div id="hint">Credits: +3/s passive, +15 per kill. Harden=20cr, Reboot=40cr, agents cost credits.</div>
  <div id="rules">rules: balanced response</div>
  <div id="rules-status" style="color:#3a5570;font-size:10px;margin-top:4px">rules: loading...</div>
</div>
<div id="log-panel">
  <h2>EVENT LOG</h2>
  <div id="log-entries"></div>
</div>

<div id="end-overlay">
  <div id="end-box">
    <div id="end-title"></div>
    <div id="end-stats"></div>
    <button id="end-restart">Restart</button>
  </div>
</div>

<script src="./telemetry-client.js"></script>
<script type="module" src="./network_defense.js"></script>
</body>
</html>
